<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="icon" href="public/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="/css/log.css">
</head>

<body>
    <div class="login-container">

        <div class="login-text"></div>

        <div class="login-form">
            <div class="login-form-content">

                <img src="/public/nome.png" width="200">
                <h3>Faça seu Login</h3>           

                <!-- ✅ FORM CORRIGIDO -->
               <form id="loginForm">
                    <input type="text" id="email" placeholder="E-mail">
                    <input type="password" id="senha" placeholder="Senha">

                    <a href="#">Esqueci minha senha</a>

                    <button type="submit">Entrar</button>
                </form>

                <!-- ✅ MENSAGEM -->
                <div id="loginMessage" style="margin-top:10px;"></div>

                <div class="login-form-divider">
                    <div> Ou Faça Login com </div>
                </div>

                <a href="#" id="login-form-google">
                    <div id="Google-container"> 
                        <div class="Google-icon"></div>
                        <span id="Google-sign-in">Sign in with Google</span>
                    </div> 
                </a>

                <div class="login-form-subscribe">
                    Não tem uma conta? <a href="/pages/cad.html">Inscreva-se</a>
                </div>

            </div>
        </div>
    </div>

    <script src="/script/script-log.js"></script>
</body>
</html>
